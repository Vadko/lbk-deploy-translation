name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      # Run as separate steps so the GitHub Actions UI shows each check
      # individually — failing biome shouldn't read as "typecheck failed".
      - name: Typecheck (tsc)
        run: pnpm typecheck

      - name: Lint + format (biome)
        run: pnpm biome:check

      - name: Tests (vitest)
        run: pnpm test

      - name: Build (ncc)
        run: pnpm build
